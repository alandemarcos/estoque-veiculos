<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Sistema de Estoque de Veículos</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f2937;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
flex:1;
}

.card h2{
margin:0;
color:#444;
}

.card p{
font-size:28px;
margin-top:10px;
color:#2563eb;
}

.filtros{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:8px 14px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th{
background:#1f2937;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f1f5f9;
}

</style>

</head>

<body>

<header>
Sistema Automotivo – Gestão de Estoque
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>Total de Veículos</h2>
<p id="total">0</p>
</div>

<div class="card">
<h2>Disponíveis</h2>
<p id="disponivel">0</p>
</div>

<div class="card">
<h2>Vendidos</h2>
<p id="vendido">0</p>
</div>

</div>

<div class="filtros">

<h3>Filtro de Veículos</h3>

<input id="marca" placeholder="Marca">

<input id="modelo" placeholder="Modelo">

<input id="ano" placeholder="Ano">

<select id="status">
<option value="">Status</option>
<option value="DISPONIVEL">Disponível</option>
<option value="VENDIDO">Vendido</option>
<option value="RESERVADO">Reservado</option>
</select>

<button onclick="filtrar()">Filtrar</button>
<button onclick="listar()">Listar Todos</button>

</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>Marca</th>
<th>Modelo</th>
<th>Ano</th>
<th>Cor</th>
<th>Preço</th>
<th>KM</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tabela">

</tbody>

</table>

</div>

<script>

const API = "http://localhost:8080/veiculos"

function listar(){
fetch(API)
  .then(res => {
    if (!res.ok) throw new Error(`Erro HTTP ${res.status}`)
    return res.json()
  })
  .then(data => {
    preencherTabela(data)
    atualizarDashboard(data)
  })
  .catch(err => {
    console.error("Erro ao listar veículos:", err)
    document.getElementById("tabela").innerHTML = `
      <tr><td colspan="8" style="color:#dc2626; padding:20px;">
        Não foi possível conectar à API. Verifique se o backend está rodando em ${API}
        <br><small>${err.message}</small>
      </td></tr>`
  })
}

function filtrar(){

let marca = document.getElementById("marca").value
let modelo = document.getElementById("modelo").value
let ano = document.getElementById("ano").value
let status = document.getElementById("status").value

let url = API + "?"

if(marca) url += "marca=" + marca + "&"
if(modelo) url += "modelo=" + modelo + "&"
if(ano) url += "ano=" + ano + "&"
if(status) url += "status=" + status

fetch(url)
  .then(res => {
    if (!res.ok) throw new Error(`Erro HTTP ${res.status}`)
    return res.json()
  })
  .then(data => {
    preencherTabela(data)
    atualizarDashboard(data)
  })
  .catch(err => {
    console.error("Erro ao filtrar:", err)
    document.getElementById("tabela").innerHTML = `
      <tr><td colspan="8" style="color:#dc2626; padding:20px;">
        Erro ao conectar: ${err.message}
      </td></tr>`
  })
}

function preencherTabela(veiculos){

let tabela = document.getElementById("tabela")
tabela.innerHTML = ""

if (!Array.isArray(veiculos)) return

veiculos.forEach(v => {

let linha = `
<tr>
<td>${v.id}</td>
<td>${v.marca}</td>
<td>${v.modelo}</td>
<td>${v.ano}</td>
<td>${v.cor}</td>
<td>R$ ${v.preco}</td>
<td>${v.quilometragem}</td>
<td>${v.status}</td>
</tr>
`

tabela.innerHTML += linha

})

}

function atualizarDashboard(veiculos){

if (!Array.isArray(veiculos)) return

let total = veiculos.length
let disponivel = veiculos.filter(v => v.status==="DISPONIVEL").length
let vendido = veiculos.filter(v => v.status==="VENDIDO").length

document.getElementById("total").innerText = total
document.getElementById("disponivel").innerText = disponivel
document.getElementById("vendido").innerText = vendido

}

listar()

</script>

</body>
</html>
